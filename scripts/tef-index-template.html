<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Muhammad Awais Success Web — Learn French, practice TEF mocks, track your results">
  <title>M.Awais Success Web</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="profileGate" class="profile-gate">
    <div class="profile-card">
      <img class="profile-logo" src="logo.png" alt="M.Awais Success Web logo">
      <p class="profile-tagline">Learn French · TEF Preparation</p>
      <h2>Welcome to M.Awais Success Web</h2>
      <form id="profileForm" class="profile-form">
        <label>
          <span>Full name</span>
          <input name="name" type="text" required placeholder="Your name">
        </label>
        <label>
          <span>Age</span>
          <input name="age" type="number" min="10" max="99" required placeholder="Age">
        </label>
        <label>
          <span>Gender</span>
          <select name="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <button type="submit" class="primary">Start practicing</button>
      </form>
    </div>
  </div>

  <div id="app" class="app-shell">
    <div id="sidebarOverlay" class="sidebar-overlay" hidden></div>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="logo.png" alt="M.Awais Success Web" class="brand-logo">
        <div class="brand-copy">
          <h1>M.Awais Success Web</h1>
          <p id="courseMeta">Loading course...</p>
        </div>
      </div>
      <nav id="sectionNav" class="section-nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuToggle" class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">&#9776;</button>
          <div>
            <p class="eyebrow">TEF practice &amp; review</p>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
        </div>
        <div class="top-actions">
          <div id="userChip" class="user-chip" hidden></div>
          <button id="quizModeBtn" class="mode-btn" type="button">📝 Quiz Mode</button>
          <button id="reviewModeBtn" class="mode-btn" type="button">👁 Review Mode</button>
        </div>
      </header>
      <div id="quizProgress" class="quiz-progress" hidden></div>
      <section id="content" class="content">
        <div class="loading-state">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p>Loading quizzes...</p>
        </div>
      </section>
      <div id="submitBar" class="submit-bar" hidden>
        <div>
          <strong>Ready to submit?</strong>
          <p id="submitHint">Answer all questions, then submit to see your score and review answers.</p>
        </div>
        <button id="submitQuizBtn" type="button" class="primary">Submit Quiz</button>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
